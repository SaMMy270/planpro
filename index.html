
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanPro | Premium AR Furniture</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            text: 'var(--text)',
            body: 'var(--body)',
            background: 'var(--background)',
            primary: 'var(--primary)',
            secondary: 'var(--secondary)',
            accent: 'var(--accent)',
            highlight: 'var(--highlight)',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-heading: 'Playfair Display', serif;
      --font-heading-alt: 'Montserrat', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    
    body {
      font-family: var(--font-body) !important;
      scroll-behavior: smooth;
      background: var(--background);
      color: var(--text);
      overflow-x: hidden;
    }

    h1 {
      font-family: var(--font-heading) !important;
      font-size: 56px;
      font-weight: 400;
      letter-spacing: -0.5px;
      line-height: 1.2;
    }

    h2, h3, h4, h5, h6, .font-heading-alt, button, .label, .badge {
      font-family: var(--font-heading-alt) !important;
    }

    .font-serif, h1.font-serif, h2.font-serif { 
      font-family: var(--font-heading) !important; 
    }

    .font-sans {
      font-family: var(--font-heading-alt) !important;
    }

    /* Custom scrollbar utility */
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--color-warm-primary, rgba(139, 86, 51, 0.2)); border-radius: 20px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
      "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "html2canvas": "https://esm.sh/html2canvas@^1.4.1"
    }
  }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-text">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
